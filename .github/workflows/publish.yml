name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Silences the Node 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
        
    - name: Install build dependencies
      run: python -m pip install --upgrade pip build
      
    - name: Build Source Distribution (sdist)
      working-directory: ./open-source-wst
      run: python -m build --sdist
      
    - name: Build manylinux wheels
      uses: pypa/cibuildwheel@v2
      with:
        # Tell cibuildwheel where the package is
        package-dir: ./open-source-wst
        # Drop the finished wheels right next to the sdist
        output-dir: ./open-source-wst/dist
        
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: ./open-source-wst/dist/
