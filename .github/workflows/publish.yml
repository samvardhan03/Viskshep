name: Publish OmniPulse to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build & Upload to PyPI
    runs-on: ubuntu-latest
    
    # Required for PyPA OIDC trusted publishers
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build hatchling

      - name: Build generic package (sdist / wheel)
        working-directory: ./open-source-wst
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: open-source-wst/dist/
